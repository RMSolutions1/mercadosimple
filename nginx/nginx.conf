upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:3001;
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name mercadosimple.com.ar www.mercadosimple.com.ar api.mercadosimple.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — mercadosimple.com.ar
server {
    listen 443 ssl http2;
    server_name mercadosimple.com.ar www.mercadosimple.com.ar;

    ssl_certificate     /etc/letsencrypt/live/mercadosimple.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercadosimple.com.ar/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Assets estáticos con cache larga
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API — api.mercadosimple.com.ar
server {
    listen 443 ssl http2;
    server_name api.mercadosimple.com.ar;

    ssl_certificate     /etc/letsencrypt/live/mercadosimple.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercadosimple.com.ar/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    # Rate limiting a nivel nginx
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req zone=api burst=60 nodelay;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
