# fly.toml app configuration file generated for mercadosimple-web on 2026-03-17T11:04:46-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mercadosimple-web'
primary_region = 'gru'

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = "https://mercadosimple-api.fly.dev/api"
    NEXT_PUBLIC_SITE_URL = "https://mercadosimple-web.fly.dev"

[env]
  NODE_ENV = 'production'
  NEXT_PUBLIC_API_URL = 'https://mercadosimple-api.fly.dev/api'
  NEXT_PUBLIC_SITE_URL = 'https://mercadosimple-web.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    path = '/'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
