version: '3.9'

services:
  # ── Base de datos PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mercadosimple}
      POSTGRES_USER: ${DB_USERNAME:-mercadosimple}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mercadosimple123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mercadosimple}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms_network

  # ── Backend NestJS ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-mercadosimple}
      DB_PASSWORD: ${DB_PASSWORD:-mercadosimple123}
      DB_DATABASE: ${DB_DATABASE:-mercadosimple}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://mercadosimple.com.ar}
      APP_URL: ${APP_URL:-https://mercadosimple.com.ar}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-"Mercado Simple" <noreply@mercadosimple.com.ar>}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
    ports:
      - "3001:3001"
    networks:
      - ms_network

  # ── Frontend Next.js ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.mercadosimple.com.ar/api}
    container_name: ms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.mercadosimple.com.ar/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://mercadosimple.com.ar}
    ports:
      - "3000:3000"
    networks:
      - ms_network

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ms_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ms_network

  # ── Certbot (SSL Let's Encrypt) ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: ms_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - ms_network

  # ── pgAdmin (solo en development) ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ms_pgadmin
    restart: unless-stopped
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mercadosimple.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ms_network

volumes:
  postgres_data:
  certbot_www:

networks:
  ms_network:
    driver: bridge
